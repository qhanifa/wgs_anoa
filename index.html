<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genomic Logbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.33.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #e8eaed;
  --surface: #f2f3f5;
  --surface2: #e2e4e8;
  --surface3: #d5d8dd;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text: #1c2030;
  --muted: #6b7589;
  --accent: #1D9E75;
  --accent-dim: rgba(29,158,117,0.12);
  --accent-border: rgba(29,158,117,0.4);
  --green: #1D9E75;
  --green-dim: rgba(29,158,117,0.12);
  --red: #b83232;
  --red-dim: rgba(184,50,50,0.1);
  --yellow: #956200;
  --yellow-dim: rgba(149,98,0,0.1);
  --purple: #6535b0;
  --purple-dim: rgba(101,53,176,0.1);
  --teal: #0f6e56;
  --radius: 10px;
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); font-size: 14px; background: var(--bg); color: var(--text); display: flex; flex-direction: column; line-height: 1.6; }

/* Header */
.header { height: 54px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 9px; font-size: 16px; font-weight: 600; color: var(--text); }
.header-logo i { color: var(--accent); font-size: 20px; }
.tab-bar { display: flex; gap: 1px; margin-left: 8px; background: var(--surface2); border-radius: 7px; padding: 3px; }
.tab { padding: 4px 13px; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all .15s; display: flex; align-items: center; gap: 5px; font-family: var(--sans); }
.tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.count-pill { background: var(--surface3); color: var(--muted); font-size: 10px; padding: 1px 5px; border-radius: 99px; }
.tab.active .count-pill { background: var(--accent-dim); color: var(--accent); }
.header-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.header-file { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text); transition: all .15s; font-family: var(--sans); }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #178f68; }

/* Drop zone */
#dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 1rem; text-align: center; padding: 2rem; }
.drop-box { border: 2px dashed var(--border2); border-radius: 16px; padding: 3rem 5rem; cursor: pointer; transition: all .2s; background: var(--surface); }
.drop-box:hover, .drop-box.over { border-color: var(--accent); background: var(--accent-dim); }
.drop-box i { font-size: 44px; color: var(--muted); display: block; margin-bottom: .75rem; }
.drop-box h2 { font-size: 19px; font-weight: 600; margin-bottom: .4rem; }
.drop-box p { color: var(--muted); font-size: 13px; }
.sample-link { color: var(--accent); background: none; border: none; cursor: pointer; font-size: 12px; text-decoration: underline; font-family: var(--sans); }

/* App */
#app { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.app-body { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px; padding: 14px 12px; flex-shrink: 0; overflow-y: auto; }
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
.search-wrap input { width: 100%; padding: 7px 10px 7px 30px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; outline: none; transition: border .15s; font-family: var(--sans); }
.search-wrap input:focus { border-color: var(--accent-border); }
.search-wrap input::placeholder { color: var(--muted); }
.filter-section { display: flex; flex-direction: column; gap: 6px; }
.filter-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.filter-pills { display: flex; flex-wrap: wrap; gap: 4px; }
.pill { padding: 3px 9px; border-radius: 99px; font-size: 12px; border: 1px solid var(--border2); cursor: pointer; background: transparent; color: var(--muted); transition: all .12s; font-family: var(--sans); }
.pill:hover { color: var(--text); background: var(--surface2); }
.pill.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.sidebar-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
.stat-card { background: var(--surface2); border-radius: 8px; padding: 9px 11px; }
.stat-num { font-size: 22px; font-weight: 600; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* List panel */
.list-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.list-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; flex-shrink: 0; }
.list-count { font-size: 12px; color: var(--muted); }
.list-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }

/* Entry card */
.entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; cursor: pointer; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; transition: all .12s; }
.entry-card:hover { border-color: var(--border2); background: var(--surface2); }
.entry-card.selected { border-color: var(--accent-border); background: var(--accent-dim); }
.entry-top { display: flex; align-items: baseline; gap: 7px; }
.entry-id { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }
.entry-title { font-weight: 600; font-size: 15px; line-height: 1.4; }
.entry-meta { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
.entry-meta span { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
.entry-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 7px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.status-badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
.s-completed { background: var(--green-dim); color: var(--green); }
.s-failed    { background: var(--red-dim); color: var(--red); }
.s-running   { background: var(--yellow-dim); color: var(--yellow); }
.s-pending   { background: var(--purple-dim); color: var(--purple); }
.no-results  { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.no-results i { font-size: 28px; display: block; margin-bottom: 8px; }

/* Detail panel */
.detail-panel { width: 360px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.detail-panel.empty { align-items: center; justify-content: center; }
.detail-empty { text-align: center; color: var(--muted); }
.detail-empty i { font-size: 32px; display: block; margin-bottom: 10px; }
.detail-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.detail-title-text { font-weight: 600; font-size: 13px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; display: flex; align-items: center; }
.detail-close-btn:hover { color: var(--text); }
.detail-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 16px; }
.d-section { display: flex; flex-direction: column; gap: 7px; }
.d-section-label { font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.d-row { display: flex; gap: 8px; font-size: 13px; }
.d-key { color: var(--muted); width: 110px; flex-shrink: 0; }
.d-val { color: var(--text); word-break: break-all; line-height: 1.5; }
.code-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px; font-family: var(--mono); font-size: 11px; white-space: pre-wrap; color: var(--teal); line-height: 1.6; margin-top: 2px; }
.prose-val { font-size: 13px; line-height: 1.7; color: var(--text); }

/* Todo */
.todo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; display: flex; gap: 10px; align-items: start; transition: all .12s; }
.todo-card:hover { border-color: var(--border2); }
.todo-card.done { opacity: .45; }
.todo-content { flex: 1; min-width: 0; }
.todo-task { font-weight: 600; font-size: 15px; line-height: 1.4; }
.todo-task.done-text { text-decoration: line-through; color: var(--muted); }
.todo-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
.todo-meta span { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
.pri-badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 99px; }
.p-high   { background: var(--red-dim); color: var(--red); }
.p-medium { background: var(--yellow-dim); color: var(--yellow); }
.p-low    { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
.done-divider { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); padding: 8px 0 4px; border-top: 1px solid var(--border); margin-top: 6px; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<!-- Drop zone -->
<div id="dropzone">
  <div class="drop-box" id="dropBox"
    ondragover="event.preventDefault();this.classList.add('over')"
    ondragleave="this.classList.remove('over')"
    ondrop="onDrop(event)">
    <i class="ti ti-dna-2" aria-hidden="true"></i>
    <h2>Genomic Logbook</h2>
    <p>Drop your <strong>genomic_logbook.json</strong> here</p>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadFile(this.files[0])">
    <button class="btn btn-primary" style="margin-top:.75rem" onclick="document.getElementById('fileInput').click()">
      <i class="ti ti-upload" aria-hidden="true"></i> Browse file
    </button>
  </div>
  <button class="sample-link" onclick="loadData(SAMPLE,'sample_data.json')">Load sample data to preview</button>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div class="header-logo"><i class="ti ti-dna-2" aria-hidden="true"></i> Genomic Logbook</div>
    <div class="tab-bar">
      <button class="tab active" id="tabLog" onclick="switchTab('log')">
        <i class="ti ti-notebook" aria-hidden="true"></i> Logbook
        <span class="count-pill" id="badgeLog">0</span>
      </button>
      <button class="tab" id="tabTodo" onclick="switchTab('todo')">
        <i class="ti ti-checklist" aria-hidden="true"></i> To-Do
        <span class="count-pill" id="badgeTodo">0</span>
      </button>
    </div>
    <div class="header-right">
      <span class="header-file" id="fileLabel"></span>
      <button class="btn" onclick="resetApp()"><i class="ti ti-folder-open" aria-hidden="true"></i> Load file</button>
    </div>
  </div>

  <div class="app-body">

    <!-- Logbook tab -->
    <div id="viewLog" style="display:flex;flex:1;overflow:hidden;">
      <aside class="sidebar">
        <div class="search-wrap">
          <i class="ti ti-search" aria-hidden="true"></i>
          <input type="text" id="searchInput" placeholder="Search…" oninput="renderList()">
        </div>
        <div class="filter-section"><div class="filter-label">Status</div><div class="filter-pills" id="statusPills"></div></div>
        <div class="filter-section"><div class="filter-label">Tags</div><div class="filter-pills" id="tagPills"></div></div>
        <div class="filter-section"><div class="filter-label">Tool</div><div class="filter-pills" id="toolPills"></div></div>
        <div class="sidebar-stats">
          <div class="stat-card"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">Total</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--green)" id="sDone">0</div><div class="stat-lbl">Done</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--red)" id="sFail">0</div><div class="stat-lbl">Failed</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--yellow)" id="sRun">0</div><div class="stat-lbl">Running</div></div>
        </div>
      </aside>
      <div class="list-panel">
        <div class="list-header"><span class="list-count" id="listCount"></span></div>
        <div class="list-body" id="listBody"></div>
      </div>
      <div class="detail-panel empty" id="detailPanel">
        <div class="detail-empty"><i class="ti ti-file-search" aria-hidden="true"></i><div>Select an entry to view details</div></div>
      </div>
    </div>

    <!-- Todo tab -->
    <div id="viewTodo" style="display:none;flex:1;overflow:hidden;">
      <aside class="sidebar">
        <div class="filter-section"><div class="filter-label">Priority</div><div class="filter-pills" id="todoPriPills"></div></div>
        <div class="filter-section"><div class="filter-label">Category</div><div class="filter-pills" id="todoCatPills"></div></div>
        <div class="sidebar-stats">
          <div class="stat-card"><div class="stat-num" id="tPending">0</div><div class="stat-lbl">Pending</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--green)" id="tDone">0</div><div class="stat-lbl">Done</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--red)" id="tHigh">0</div><div class="stat-lbl">High pri</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--yellow)" id="tMed">0</div><div class="stat-lbl">Medium</div></div>
        </div>
      </aside>
      <div class="list-panel">
        <div class="list-header"><span class="list-count" id="todoCount"></span></div>
        <div class="list-body" id="todoBody"></div>
      </div>
    </div>

  </div>
</div>

<script>
const SAMPLE = {
  entries:[
    {id:1,timestamp:"2026-05-14T21:28:13",date:"2026-05-14",title:"Variant filtering — anoa only (1st try)",analyst:"qhanifa",project:"anoa_wgs",sample_ids:[],organism:"Bubalus depressicornis, Bubalus quarlesi",tool:"bcftools view",tool_version:"",script:"anoa_analysis/scripts/filteri_variants.sh",command:"",job_id:"filter_variants.474718",cluster:"",cpus:"8",mem:"16G",walltime:"4 hours",input_files:"anoa_analysis/vcf_denovo/raw_variants.vcf.gz",output_dir:"anoa_analysis/filtered",ref_genome:"bosTau9",status:"completed",results:"",notes:"default parameters, have not followed PNAS paper parameters",tags:["variant-calling"]},
    {id:2,timestamp:"2026-05-15T09:00:00",date:"2026-05-15",title:"GATK HaplotypeCaller — batch 2",analyst:"qhanifa",project:"anoa_wgs",sample_ids:["anoa_01","anoa_02"],organism:"Bubalus depressicornis",tool:"GATK",tool_version:"4.4.0",script:"scripts/gatk_hc.sh",command:"gatk HaplotypeCaller -R bosTau9.fa -I anoa_01.bam -O anoa_01.g.vcf.gz -ERC GVCF",job_id:"SLURM-5122",cluster:"hpc-compute",cpus:"16",mem:"64G",walltime:"12:00:00",input_files:"anoa_analysis/bam/",output_dir:"anoa_analysis/gvcf/",ref_genome:"bosTau9",status:"running",results:"",notes:"est. 10h per sample",tags:["variant-calling","GATK","WGS"]},
  ],
  todos:[
    {id:1,created:"2026-05-14T22:00:00",task:"Re-run variant filtering using PNAS paper parameters",category:"follow-up",priority:"high",due:"2026-05-20",ref_id:"1",done:false,done_at:null},
    {id:2,created:"2026-05-15T08:00:00",task:"Check alignment coverage for anoa_01 and anoa_02",category:"pending-analysis",priority:"medium",due:"",ref_id:"",done:false,done_at:null},
  ]
};

let entries=[], todos=[];
let logF={status:null,tag:null,tool:null};
let todoF={priority:null,category:null};
let selectedId=null;

function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropBox').classList.remove('over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
}
function loadFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try { loadData(JSON.parse(e.target.result), file.name); }
    catch(err) { alert('Could not parse JSON: ' + err.message); }
  };
  r.readAsText(file);
}
function loadData(data, name) {
  if (Array.isArray(data)) { entries=data; todos=[]; }
  else { entries=data.entries||[]; todos=data.todos||[]; }
  entries.sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.id-a.id);
  document.getElementById('fileLabel').textContent = name||'';
  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildLogFilters(); renderList(); updateLogStats();
  buildTodoFilters(); renderTodos(); updateTodoStats();
  document.getElementById('badgeLog').textContent  = entries.length;
  document.getElementById('badgeTodo').textContent = todos.filter(t=>!t.done).length;
}
function resetApp() {
  entries=[]; todos=[]; selectedId=null;
  logF={status:null,tag:null,tool:null};
  todoF={priority:null,category:null};
  document.getElementById('dropzone').style.display='';
  document.getElementById('app').style.display='none';
  document.getElementById('searchInput').value='';
  document.getElementById('fileInput').value='';
  closeDetail();
}

function switchTab(tab) {
  document.getElementById('viewLog').style.display  = tab==='log'  ? 'flex':'none';
  document.getElementById('viewTodo').style.display = tab==='todo' ? 'flex':'none';
  document.getElementById('tabLog').classList.toggle('active',  tab==='log');
  document.getElementById('tabTodo').classList.toggle('active', tab==='todo');
}

function buildLogFilters() {
  mkPills('statusPills',[...new Set(entries.map(e=>e.status).filter(Boolean))],'status',logF);
  mkPills('tagPills',[...new Set(entries.flatMap(e=>e.tags||[]))].sort(),'tag',logF);
  mkPills('toolPills',[...new Set(entries.map(e=>e.tool).filter(Boolean))].sort(),'tool',logF);
}
function mkPills(id,items,key,fobj) {
  document.getElementById(id).innerHTML=items.map(v=>
    `<button class="pill${fobj[key]===v?' active':''}" onclick="tog('${id}','${key}','${v}')">${v}</button>`
  ).join('');
}
function tog(pillsId,key,val) {
  if (pillsId.startsWith('todo')) {
    todoF[key]=todoF[key]===val?null:val; buildTodoFilters(); renderTodos();
  } else {
    logF[key]=logF[key]===val?null:val; buildLogFilters(); renderList();
    if (selectedId && !getFiltered().find(e=>e.id===selectedId)) closeDetail();
  }
}

function updateLogStats() {
  document.getElementById('sTotal').textContent=entries.length;
  document.getElementById('sDone').textContent=entries.filter(e=>e.status==='completed').length;
  document.getElementById('sFail').textContent=entries.filter(e=>e.status==='failed').length;
  document.getElementById('sRun').textContent=entries.filter(e=>e.status==='running').length;
}

function getFiltered() {
  const q=document.getElementById('searchInput').value.toLowerCase();
  return entries.filter(e=>{
    if(logF.status&&e.status!==logF.status)return false;
    if(logF.tag&&!(e.tags||[]).includes(logF.tag))return false;
    if(logF.tool&&e.tool!==logF.tool)return false;
    if(!q)return true;
    return[e.title,e.tool,e.project,e.status,(e.sample_ids||[]).join(' '),(e.tags||[]).join(' '),e.job_id,e.command,e.results,e.notes].join(' ').toLowerCase().includes(q);
  });
}
function renderList() {
  const filtered=getFiltered();
  document.getElementById('listCount').textContent=`${filtered.length} entr${filtered.length===1?'y':'ies'}`;
  const body=document.getElementById('listBody');
  if(!filtered.length){body.innerHTML='<div class="no-results"><i class="ti ti-search-off"></i>No entries match.</div>';return;}
  body.innerHTML=filtered.map(e=>`
    <div class="entry-card${selectedId===e.id?' selected':''}" onclick="openDetail(${e.id})">
      <div>
        <div class="entry-top"><span class="entry-id">#${e.id}</span><span class="entry-title">${x(e.title)}</span></div>
        <div class="entry-meta">
          <span><i class="ti ti-calendar" aria-hidden="true"></i>${e.date||''}</span>
          ${e.tool?`<span><i class="ti ti-tool" aria-hidden="true"></i>${x(e.tool)}${e.tool_version?' '+x(e.tool_version):''}</span>`:''}
          ${e.project?`<span><i class="ti ti-folder" aria-hidden="true"></i>${x(e.project)}</span>`:''}
          ${e.job_id?`<span><i class="ti ti-server" aria-hidden="true"></i>${x(e.job_id)}</span>`:''}
        </div>
        ${(e.tags||[]).length?`<div class="entry-tags">${e.tags.map(t=>`<span class="tag">${x(t)}</span>`).join('')}</div>`:''}
      </div>
      <span class="status-badge s-${e.status||'pending'}">${e.status||''}</span>
    </div>`).join('');
}

function openDetail(id) {
  selectedId=id; renderList();
  const e=entries.find(i=>i.id===id); if(!e) return;
  const panel=document.getElementById('detailPanel');
  panel.classList.remove('empty');
  const kv=(k,v)=>v?`<div class="d-row"><span class="d-key">${k}</span><span class="d-val">${x(v)}</span></div>`:'';
  const sec=(l,c)=>c.trim()?`<div class="d-section"><div class="d-section-label">${l}</div>${c}</div>`:'';
  panel.innerHTML=`
    <div class="detail-header">
      <span class="status-badge s-${e.status||'pending'}" style="flex-shrink:0">${e.status||''}</span>
      <span class="detail-title-text">${x(e.title)}</span>
      <button class="detail-close-btn" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="detail-body">
      <div style="font-size:11px;color:var(--muted)">${e.timestamp||''}</div>
      ${sec('Identity', kv('Analyst',e.analyst)+kv('Project',e.project)+kv('Organism',e.organism)+((e.sample_ids||[]).length?kv('Samples',e.sample_ids.join(', ')):''))}
      ${sec('Pipeline', kv('Tool',e.tool+(e.tool_version?' v'+e.tool_version:''))+kv('Script',e.script)+kv('Reference',e.ref_genome)+(e.command?`<div class="d-row"><span class="d-key">Command</span></div><div class="code-block">${x(e.command)}</div>`:''))}
      ${(e.job_id||e.cluster||e.cpus)?sec('HPC', kv('Job ID',e.job_id)+kv('Cluster',e.cluster)+kv('CPUs',e.cpus)+kv('Memory',e.mem)+kv('Wall time',e.walltime)):''}
      ${sec('I/O', kv('Output dir',e.output_dir)+(e.input_files?`<div class="d-row"><span class="d-key">Input files</span></div><div class="code-block">${x(e.input_files)}</div>`:''))}
      ${e.results?sec('Results',`<div class="prose-val">${x(e.results)}</div>`):''}
      ${e.notes?sec('Notes',`<div class="prose-val">${x(e.notes)}</div>`):''}
      ${(e.tags||[]).length?sec('Tags',`<div class="entry-tags" style="margin-top:0">${e.tags.map(t=>`<span class="tag">${x(t)}</span>`).join('')}</div>`):''}
    </div>`;
}
function closeDetail() {
  selectedId=null;
  const p=document.getElementById('detailPanel');
  p.classList.add('empty');
  p.innerHTML='<div class="detail-empty"><i class="ti ti-file-search" aria-hidden="true"></i><div>Select an entry to view details</div></div>';
  renderList();
}

function buildTodoFilters() {
  mkPills('todoPriPills',[...new Set(todos.map(t=>t.priority).filter(Boolean))],'priority',todoF);
  mkPills('todoCatPills',[...new Set(todos.map(t=>t.category).filter(Boolean))].sort(),'category',todoF);
}
function updateTodoStats() {
  const p=todos.filter(t=>!t.done);
  document.getElementById('tPending').textContent=p.length;
  document.getElementById('tDone').textContent=todos.filter(t=>t.done).length;
  document.getElementById('tHigh').textContent=p.filter(t=>t.priority==='high').length;
  document.getElementById('tMed').textContent=p.filter(t=>t.priority==='medium').length;
}
function renderTodos() {
  let ts=todos;
  if(todoF.priority)ts=ts.filter(t=>t.priority===todoF.priority);
  if(todoF.category)ts=ts.filter(t=>t.category===todoF.category);
  const pending=ts.filter(t=>!t.done);
  const done=ts.filter(t=>t.done);
  const po={high:0,medium:1,low:2};
  pending.sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999')||(po[a.priority]||9)-(po[b.priority]||9));
  document.getElementById('todoCount').textContent=`${pending.length} pending · ${done.length} done`;
  const pb=p=>`<span class="pri-badge p-${p||'low'}">${p||'low'}</span>`;
  const card=t=>`
    <div class="todo-card${t.done?' done':''}">
      <div class="todo-content">
        <div style="display:flex;align-items:baseline;gap:7px;margin-bottom:3px">
          <span style="font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0">#${t.id}</span>
          <div class="todo-task${t.done?' done-text':''}">${x(t.task)}</div>
        </div>
        <div class="todo-meta">
          ${pb(t.priority)}
          <span><i class="ti ti-tag" aria-hidden="true"></i>${x(t.category)}</span>
          ${t.due?`<span><i class="ti ti-calendar" aria-hidden="true"></i>${t.due}</span>`:''}
          ${t.ref_id?`<span><i class="ti ti-notebook" aria-hidden="true"></i>Log #${x(t.ref_id)}</span>`:''}
          ${t.done&&t.done_at?`<span><i class="ti ti-check" aria-hidden="true"></i>${t.done_at.slice(0,10)}</span>`:''}
        </div>
      </div>
    </div>`;
  let html=pending.map(card).join('');
  if(done.length)html+=`<div class="done-divider">Done (${done.length})</div>`+done.map(card).join('');
  if(!ts.length)html='<div class="no-results"><i class="ti ti-checklist"></i>No to-dos in this file.</div>';
  document.getElementById('todoBody').innerHTML=html;
}

function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
